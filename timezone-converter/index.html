    .clock-card .cbtm .cd { font-size: 11px; color: var(--text-muted); }
    .clock-card .cbtm .co { font-size: 10px; color: var(--text-muted); }

    .clock-card.nt .ci { filter: brightness(1.4); background: rgba(255,255,255,.12); border-radius: 10px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,.18); }

    footer .foot-links a { padding: 4px 10px; font-size: 13px; color: var(--text-light); border-radius: 6px; }

      <!-- YOUR TIME - TOP -->

        <div class="master-body">
          <div class="master-icon" id="masterIcon">🏮</div>
          <div class="master-info">

<script>
const TIMEZONES = [
  { name: 'UTC', code: 'UTC', city: 'UTC', emoji: '\u{1F30D}', offset: 0 },
  { name: 'US Eastern', code: 'America/New_York', city: 'New York', emoji: '\u{1F5FD}', offset: -5 },
  { name: 'US Central', code: 'America/Chicago', city: 'Chicago', emoji: '\u{1F309}', offset: -6 },
  { name: 'US Mountain', code: 'America/Denver', city: 'Denver', emoji: '\u{1F304}', offset: -7 },
  { name: 'US Pacific', code: 'America/Los_Angeles', city: 'Los Angeles', emoji: '\u{1F3AC}', offset: -8 },
  { name: 'Alaska', code: 'America/Anchorage', city: 'Anchorage', emoji: '\u{1F427}', offset: -9 },
  { name: 'Hawaii', code: 'Pacific/Honolulu', city: 'Honolulu', emoji: '\u{1F334}', offset: -10 },
  { name: 'Canada Atlantic', code: 'America/Halifax', city: 'Halifax', emoji: '\u{1F99E}', offset: -4 },
  { name: 'Brazil', code: 'America/Sao_Paulo', city: 'São Paulo', emoji: '\u{1F3AD}', offset: -3 },
  { name: 'Argentina', code: 'America/Argentina/Buenos_Aires', city: 'Buenos Aires', emoji: '\u{1F4AA}', offset: -3 },
  { name: 'UK/Ireland', code: 'Europe/London', city: 'London', emoji: '\u{1F3EC}', offset: 0 },
  { name: 'Central Europe', code: 'Europe/Berlin', city: 'Berlin', emoji: '\u{1F3EA}', offset: 1 },
  { name: 'Eastern Europe', code: 'Europe/Helsinki', city: 'Helsinki', emoji: '\u{1F525}', offset: 2 },
  { name: 'Moscow', code: 'Europe/Moscow', city: 'Moscow', emoji: '\u{1F3F7}', offset: 3 },
  { name: 'Dubai', code: 'Asia/Dubai', city: 'Dubai', emoji: '\u{1F306}', offset: 4 },
  { name: 'India', code: 'Asia/Kolkata', city: 'Kolkata', emoji: '\u{1F54C}', offset: 5.5 },
  { name: 'Bangladesh', code: 'Asia/Dhaka', city: 'Dhaka', emoji: '\u{1F405}', offset: 6 },
  { name: 'Thailand', code: 'Asia/Bangkok', city: 'Bangkok', emoji: '\u{1F6DF}', offset: 7 },
  { name: 'China', code: 'Asia/Shanghai', city: 'Shanghai', emoji: '\u{1F43C}', offset: 8 },
  { name: 'Singapore', code: 'Asia/Singapore', city: 'Singapore', emoji: '\u{1F9FB}', offset: 8 },
  { name: 'Japan', code: 'Asia/Tokyo', city: 'Tokyo', emoji: '\u{1F338}', offset: 9 },
  { name: 'Korea', code: 'Asia/Seoul', city: 'Seoul', emoji: '\u{1F30F}', offset: 9 },
  { name: 'Australia AEST', code: 'Australia/Sydney', city: 'Sydney', emoji: '\u{1F31F}', offset: 10 },
  { name: 'Australia ACDT', code: 'Australia/Adelaide', city: 'Adelaide', emoji: '\u{1F30A}', offset: 10.5 },
  { name: 'Australia AWST', code: 'Australia/Perth', city: 'Perth', emoji: '\u{1F3D4}', offset: 8 },
  { name: 'New Zealand', code: 'Pacific/Auckland', city: 'Auckland', emoji: '\u{1F98B}', offset: 12 },
  { name: 'Fiji', code: 'Pacific/Fiji', city: 'Suva', emoji: '\u{1F33A}', offset: 12 },
  { name: 'South Africa', code: 'Africa/Johannesburg', city: 'Johannesburg', emoji: '\u{1F9A7}', offset: 2 },
  { name: 'Nigeria', code: 'Africa/Lagos', city: 'Lagos', emoji: '\u{1F3B2}', offset: 1 },
  { name: 'Kenya', code: 'Africa/Nairobi', city: 'Nairobi', emoji: '\u{1F98C}', offset: 3 },
];

function getTzOffset(tzCode, date) {
  try {
    const opts = { timeZone: tzCode, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' };
    const parts = new Intl.DateTimeFormat('en-CA', opts).formatToParts(date);
    const get = type => { const p = parts.find(x => x.type === type); return p ? parseInt(p.value, 10) : 0; };
    const local = new Date(Date.UTC(get('year'), get('month')-1, get('day'), get('hour'), get('minute'), get('second')));
    return Math.round((local - date) / 60000);
  } catch(e) {
    const tz = TIMEZONES.find(t => t.code === tzCode);
    return tz ? Math.round(tz.offset * 60) : 0;
  }
}

function fmtTime(date, tzCode) {
  try { return new Intl.DateTimeFormat('en-US', { timeZone: tzCode, hour: '2-digit', minute: '2-digit', hour12: false }).format(date); }
  catch { return '--:--'; }
}

function fmtDate(date, tzCode) {
  try { return new Intl.DateTimeFormat('en-US', { timeZone: tzCode, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }).format(date); }
  catch { return '---'; }
}

function fmtShortDate(date, tzCode) {
  try { return new Intl.DateTimeFormat('en-US', { timeZone: tzCode, weekday: 'short', month: 'short', day: 'numeric' }).format(date); }
  catch { return '---'; }
}

function fmtOffset(tzCode, date) {
  const min = getTzOffset(tzCode, date);
  const abs = Math.abs(min);
  const h = Math.floor(abs / 60);
  const m = Math.round(abs % 60);
  const sign = min >= 0 ? '+' : '-';
  return 'UTC' + sign + h + (m ? ':' + String(m).padStart(2,'0') : '');
}

function getHour(tzCode, date) {
  try { return parseInt(new Intl.DateTimeFormat('en-US', { timeZone: tzCode, hour: '2-digit', hour12: false }).format(date), 10); }
  catch { return 12; }
}

let masterDate = new Date();

function populateSelect() {
  const sel = document.getElementById('masterTz');
  TIMEZONES.forEach((tz, i) => {
    sel.innerHTML += '<option value="' + i + '">' + (tz.emoji || '') + ' ' + tz.name + '</option>';
  });
  const browserTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const idx = TIMEZONES.findIndex(t => t.code === browserTz);
  sel.value = idx >= 0 ? idx : TIMEZONES.findIndex(t => t.code === 'Asia/Shanghai');
}

function getMasterTzCode() { return TIMEZONES[parseInt(document.getElementById('masterTz').value)].code; }
function getMasterTz() { return TIMEZONES[parseInt(document.getElementById('masterTz').value)]; }

function updateMasterDisplay() {
  const tz = getMasterTz();
  document.getElementById('masterIcon').textContent = tz.emoji || '\u{1F310}';
  const tzCode = getMasterTzCode();
  document.getElementById('masterTime').textContent = fmtTime(masterDate, tzCode);
  document.getElementById('masterDate').textContent = fmtDate(masterDate, tzCode);
  document.getElementById('masterTzLabel').textContent = fmtOffset(tzCode, masterDate);
}

function updateAllClocks() {
  const srcTz = getMasterTzCode();
  const srcOffset = getTzOffset(srcTz, masterDate);
  const grid = document.getElementById('clockGrid');

  grid.innerHTML = TIMEZONES.map((tz, i) => {
    const t = fmtTime(masterDate, tz.code);
    const d = fmtShortDate(masterDate, tz.code);
    const off = fmtOffset(tz.code, masterDate);
    const e = tz.emoji || '\u{1F310}';
    const h = getHour(tz.code, masterDate);
    const isNight = h < 6 || h >= 20;

    const tzOff = getTzOffset(tz.code, masterDate);
    const diffMin = tzOff - srcOffset;
    let diffLabel = '', diffClass = 's';
    if (diffMin === 0) { diffLabel = 'same'; }
    else if (diffMin > 0) { const hh = Math.floor(diffMin / 60); diffLabel = '+' + hh + 'h'; diffClass = 'a'; const rm = Math.abs(diffMin) % 60; if(rm) diffLabel += String(rm); }
    else { const hh = Math.floor(-diffMin / 60); diffLabel = '-' + hh + 'h'; diffClass = 'b'; const rm = Math.abs(diffMin) % 60; if(rm) diffLabel += String(rm); }

    return '<div class="clock-card' + (isNight ? ' nt' : '') + '">' +
      '<div class="ci">' + e + '</div>' +
      '<div class="cb">' +
      '<div class="ct"><span class="cn">' + tz.city + '</span><span class="ctm">' + t + '</span></div>' +
      '<div class="cbtm"><span class="cd">' + d + '</span><span class="co">' + off + '</span><span class="df ' + diffClass + '">' + diffLabel + '</span></div>' +
      '</div></div>';
  }).join('');
}

function refresh() { updateMasterDisplay(); updateAllClocks(); }

function convertFromInput() {
  const dateStr = document.getElementById('masterDateInput').value;
  const timeStr = document.getElementById('masterTimeInput').value;
  if (!dateStr || !timeStr) return;
  const [y, m, d] = dateStr.split('-').map(Number);
  const [h, min] = timeStr.split(':').map(Number);
  const inputDate = new Date(Date.UTC(y, m-1, d, h, min));
  const offset = getTzOffset(getMasterTzCode(), inputDate);
  masterDate = new Date(inputDate.getTime() - offset * 60000);
  refresh();
}

function resetNow() {
  masterDate = new Date();
  const tzCode = getMasterTzCode();
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tzCode, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).format(masterDate);
  const pd = parts.split(', ');
  document.getElementById('masterDateInput').value = pd[0];
  document.getElementById('masterTimeInput').value = pd[1].slice(0,5);
  refresh();
}

function initInputs() {
  const tzCode = getMasterTzCode();
  const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tzCode, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).format(masterDate);
  const pd = parts.split(', ');
  document.getElementById('masterDateInput').value = pd[0];
  document.getElementById('masterTimeInput').value = pd[1].slice(0,5);
  refresh();
}

populateSelect();
initInputs();
document.getElementById('masterTz').addEventListener('change', convertFromInput);
document.getElementById('masterDateInput').addEventListener('input', convertFromInput);
document.getElementById('masterTimeInput').addEventListener('input', convertFromInput);
setInterval(() => {
  const now = new Date();
  if (Math.abs(masterDate.getTime() - now.getTime()) < 5000) {
    masterDate = new Date();
    initInputs();
  }
}, 60000);
</script>
